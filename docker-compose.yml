services:
  destination_postgres_db:
    networks:
      - elt_network
    image: postgres:16
    environment:
      POSTGRES_DB: $POSTGRES_DB
      POSTGRES_USER: $POSTGRES_USER
      POSTGRES_PASSWORD: $POSTGRES_PASSWORD
      POSTGRES_SERVICE: $POSTGRES_SERVICE
      POSTGRES_PORT: $POSTGRES_PORT
    volumes:
      - ./source_init/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}']
      interval: 10s
      retries: 5
      start_period: 30s
      timeout: 10s
    env_file:
      - .env
  
  ingestion:
    networks:
      - elt_network
    build: ./ingestion
    depends_on:
      destination_postgres_db:
        condition: service_healthy
        restart: true
    volumes:
      - ./netflix_data:/app/netflix_data
    env_file:
      - .env

networks:
  elt_network:
    driver: bridge