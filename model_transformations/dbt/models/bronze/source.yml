version: 2

sources:
  - name: destination_postgres_db
    database: netflix_db
    schema: bronze
    tables:
      - name: raw_netflix_titles
        description: "Raw data containing information of TV Serices and Movies listed on netflix."
        columns:
          - name: show_id
          - name: type
          - name: title
          - name: director
          - name: casts
          - name: country
          - name: date_added
          - name: release_year
          - name: rating
          - name: duration
          - name: listed_in
          - name: description
